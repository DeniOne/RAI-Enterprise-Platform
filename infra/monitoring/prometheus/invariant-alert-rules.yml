groups:
  - name: rai_invariant_alerts
    rules:
      - alert: RAIInvariantTenantViolationSpike
        expr: increase(invariant_tenant_violation_rate[5m]) > 0
        for: 2m
        labels:
          severity: critical
          domain: tenant
        annotations:
          summary: "Tenant invariant violations detected"
          description: "Tenant violations increased in the last 5 minutes. Investigate possible cross-tenant leak path."
          runbook: "docs/INVARIANT_ALERT_RUNBOOK_RU.md#tenant-violation"

      - alert: RAIInvariantCrossTenantAttempt
        expr: increase(invariant_cross_tenant_access_attempts_total[5m]) > 0
        for: 1m
        labels:
          severity: critical
          domain: tenant
        annotations:
          summary: "Cross-tenant access attempts detected"
          description: "Cross-tenant access attempts were recorded. Immediate triage required."
          runbook: "docs/INVARIANT_ALERT_RUNBOOK_RU.md#cross-tenant-attempt"

      - alert: RAIInvariantIllegalTransition
        expr: increase(invariant_illegal_transition_attempts_total[10m]) > 0
        for: 2m
        labels:
          severity: high
          domain: fsm
        annotations:
          summary: "Illegal FSM transitions detected"
          description: "Illegal FSM transitions detected in runtime. Validate state transition paths and DB constraints."
          runbook: "docs/INVARIANT_ALERT_RUNBOOK_RU.md#illegal-fsm-transition"

      - alert: RAIInvariantFinancialFailure
        expr: increase(invariant_financial_failures_total[5m]) > 0
        for: 1m
        labels:
          severity: critical
          domain: finance
        annotations:
          summary: "Financial invariant failures detected"
          description: "Financial invariant failures detected. Validate ledger integrity and panic mode state."
          runbook: "docs/INVARIANT_ALERT_RUNBOOK_RU.md#financial-invariant-failure"

      - alert: RAIFinancialPanicModeActive
        expr: invariant_financial_failures_total >= 5
        for: 1m
        labels:
          severity: critical
          domain: finance
        annotations:
          summary: "Financial panic mode threshold reached"
          description: "Financial invariant failures crossed panic threshold. New financial ingest should be blocked."
          runbook: "docs/INVARIANT_ALERT_RUNBOOK_RU.md#financial-panic-mode"

      - alert: RAIEventDuplicatesPrevented
        expr: increase(invariant_event_duplicates_prevented_total[10m]) > 0
        for: 2m
        labels:
          severity: warning
          domain: events
        annotations:
          summary: "Duplicate events were prevented by relay"
          description: "Relay dedupe intercepted duplicate events. Investigate producer retries and idempotency contracts."
          runbook: "docs/INVARIANT_ALERT_RUNBOOK_RU.md#event-duplicates-prevented"

      - alert: RAIFinanceReconciliationAnomaly
        expr: increase(invariant_reconciliation_alerts_total[10m]) > 0
        for: 1m
        labels:
          severity: critical
          domain: finance
        annotations:
          summary: "Finance reconciliation anomalies detected"
          description: "Reconciliation job detected missing ledger entries or debit/credit mismatch."
          runbook: "docs/INVARIANT_ALERT_RUNBOOK_RU.md#finance-reconciliation-anomaly"

      - alert: RAIOutboxBacklogHigh
        expr: outbox_pending_messages > 100
        for: 5m
        labels:
          severity: high
          domain: events
        annotations:
          summary: "Outbox backlog is high"
          description: "Pending outbox queue exceeded threshold for 5 minutes."
          runbook: "docs/INVARIANT_ALERT_RUNBOOK_RU.md#outbox-backlog-high"

      - alert: RAIOutboxDlqNonZero
        expr: outbox_failed_messages > 0
        for: 2m
        labels:
          severity: high
          domain: events
        annotations:
          summary: "Outbox DLQ contains failed messages"
          description: "Outbox has FAILED messages requiring triage/replay or fix."
          runbook: "docs/INVARIANT_ALERT_RUNBOOK_RU.md#outbox-dlq-non-zero"

      - alert: RAIOutboxOldestPendingAgeHigh
        expr: outbox_oldest_pending_age_seconds > 300
        for: 5m
        labels:
          severity: warning
          domain: events
        annotations:
          summary: "Outbox oldest pending age is high"
          description: "Oldest pending outbox message age exceeds 5 minutes."
          runbook: "docs/INVARIANT_ALERT_RUNBOOK_RU.md#outbox-oldest-pending-age-high"

      - alert: RAIMemoryOldestUnconsolidatedAgeHigh
        expr: memory_oldest_unconsolidated_age_seconds > 21600
        for: 15m
        labels:
          severity: warning
          domain: memory
        annotations:
          summary: "Memory consolidation is lagging"
          description: "Oldest unconsolidated memory interaction age exceeds 6 hours."
          runbook: "docs/INVARIANT_ALERT_RUNBOOK_RU.md#memory-oldest-unconsolidated-age-high"

      - alert: RAIMemoryPruningBacklogHigh
        expr: memory_prunable_consolidated_interactions > 1000
        for: 15m
        labels:
          severity: warning
          domain: memory
        annotations:
          summary: "Memory pruning backlog is high"
          description: "Consolidated interactions older than retention exceed threshold."
          runbook: "docs/INVARIANT_ALERT_RUNBOOK_RU.md#memory-pruning-backlog-high"

      - alert: RAIMemoryEngramFormationStale
        expr: memory_latest_engram_formation_age_seconds > 604800
        for: 30m
        labels:
          severity: warning
          domain: memory
        annotations:
          summary: "Engram formation freshness is stale"
          description: "No recent engram formation observed within the expected freshness window."
          runbook: "docs/INVARIANT_ALERT_RUNBOOK_RU.md#memory-engram-formation-stale"

      - alert: RAIMemoryEngramFormationCandidatesStale
        expr: memory_engram_formation_candidates > 0 and memory_oldest_engram_formation_candidate_age_seconds > 604800 and memory_engram_formation_paused == 0
        for: 30m
        labels:
          severity: warning
          domain: memory
        annotations:
          summary: "Engram formation candidates are stale"
          description: "TechMaps awaiting engram formation exceeded the expected age budget while the formation path is not paused."
          runbook: "docs/INVARIANT_ALERT_RUNBOOK_RU.md#memory-engram-formation-candidates-stale"

      - alert: RAIMemoryEngramFormationBudgetBurnHigh
        expr: memory_engram_formation_budget_usage_ratio > 0.8 and memory_engram_formation_budget_usage_ratio <= 1 and memory_engram_formation_paused == 0
        for: 30m
        labels:
          severity: warning
          domain: memory
        annotations:
          summary: "Engram formation freshness budget is burning fast"
          description: "Engram formation consumed more than 80% of its freshness budget and is approaching a stale breach."
          runbook: "docs/INVARIANT_ALERT_RUNBOOK_RU.md#memory-engram-formation-budget-burn-high"

      - alert: RAIMemoryEngramFormationBurnRateMultiWindow
        expr: memory_engram_formation_budget_usage_ratio > 0.6 and delta(memory_engram_formation_budget_usage_ratio[6h]) > 0.03 and delta(memory_engram_formation_budget_usage_ratio[24h]) > 0.12 and memory_engram_formation_paused == 0
        for: 30m
        labels:
          severity: high
          domain: memory
        annotations:
          summary: "Engram formation budget burn is sustained across short and long windows"
          description: "Engram formation budget usage keeps rising across both 6h and 24h windows, indicating sustained freshness degradation."
          runbook: "docs/INVARIANT_ALERT_RUNBOOK_RU.md#memory-engram-formation-burn-rate-multi-window"

      - alert: RAIMemoryPrunableActiveEngramsHigh
        expr: memory_prunable_active_engrams > 500
        for: 30m
        labels:
          severity: warning
          domain: memory
        annotations:
          summary: "Too many active engrams are prune candidates"
          description: "Active engrams matching pruning criteria exceeded the warning threshold."
          runbook: "docs/INVARIANT_ALERT_RUNBOOK_RU.md#memory-prunable-active-engrams-high"

      - alert: RAIMemoryEngramPruningBudgetBurnHigh
        expr: memory_engram_pruning_budget_usage_ratio > 0.8 and memory_engram_pruning_budget_usage_ratio <= 1 and memory_engram_pruning_paused == 0
        for: 30m
        labels:
          severity: warning
          domain: memory
        annotations:
          summary: "Engram pruning budget is burning fast"
          description: "Active engram pruning consumed more than 80% of its candidate budget and is approaching a threshold breach."
          runbook: "docs/INVARIANT_ALERT_RUNBOOK_RU.md#memory-engram-pruning-budget-burn-high"

      - alert: RAIMemoryEngramPruningBurnRateMultiWindow
        expr: memory_engram_pruning_budget_usage_ratio > 0.6 and delta(memory_engram_pruning_budget_usage_ratio[6h]) > 0.1 and delta(memory_engram_pruning_budget_usage_ratio[24h]) > 0.2 and memory_engram_pruning_paused == 0
        for: 30m
        labels:
          severity: high
          domain: memory
        annotations:
          summary: "Engram pruning budget burn is sustained across short and long windows"
          description: "Engram pruning budget usage keeps rising across both 6h and 24h windows, indicating sustained backlog growth."
          runbook: "docs/INVARIANT_ALERT_RUNBOOK_RU.md#memory-engram-pruning-burn-rate-multi-window"

      - alert: RAIMemoryEngramPruningStalled
        expr: memory_prunable_active_engrams > 0 and increase(invariant_memory_engram_pruned_total[24h]) == 0
        for: 30m
        labels:
          severity: warning
          domain: memory
        annotations:
          summary: "Engram pruning throughput is stalled"
          description: "Prunable active engrams exist, but no pruning throughput was recorded in the last 24 hours."
          runbook: "docs/INVARIANT_ALERT_RUNBOOK_RU.md#memory-engram-pruning-stalled"

      - alert: RAIMemoryAutoRemediationFailures
        expr: memory_auto_remediation_enabled == 1 and increase(invariant_memory_auto_remediation_failures_total[1h]) > 0
        for: 15m
        labels:
          severity: warning
          domain: memory
        annotations:
          summary: "Automatic memory remediation recorded failures"
          description: "Automatic memory remediation attempts failed in the last hour. Review cooldowns, playbooks and worker logs."
          runbook: "docs/INVARIANT_ALERT_RUNBOOK_RU.md#memory-auto-remediation-failures"
