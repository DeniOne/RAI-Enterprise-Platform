name: invariant-gates

on:
  pull_request:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  invariant-gates:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Prepare artifacts dir
        run: mkdir -p artifacts

      - name: Invariant gate (hard fail)
        run: pnpm gate:invariants:enforce | tee artifacts/invariant-gate.log

      - name: DB phase 0 gate (hard fail)
        run: pnpm gate:db:phase0:enforce | tee artifacts/db-phase0-gate.log

      - name: DB phase 3 fragmentation gate (hard fail)
        run: pnpm gate:db:phase3:enforce | tee artifacts/db-phase3-gate.log

      - name: DB projection register gate (hard fail)
        run: pnpm gate:db:projections:enforce | tee artifacts/db-projection-gate.log

      - name: DB enum register gate (hard fail)
        run: pnpm gate:db:enum-register:enforce | tee artifacts/db-enum-register-gate.log

      - name: DB index evidence gate (hard fail)
        run: pnpm gate:db:index-evidence:enforce | tee artifacts/db-index-evidence-gate.log

      - name: DB growth KPI gate (hard fail)
        run: pnpm gate:db:growth-kpi:enforce | tee artifacts/db-growth-kpi-gate.log

      - name: Tenant context lint (warn-mode report)
        run: pnpm lint:tenant-context | tee artifacts/tenant-context-lint.log

      - name: Build rollout guard input
        run: node scripts/rollout-guard-input-from-env.cjs --out artifacts/rollout-guard-input.json

      - name: Rollout guard (hard fail)
        run: pnpm gate:rollout -- --input artifacts/rollout-guard-input.json | tee artifacts/rollout-gate.log

      - name: Routing primary slices + case memory gate (hard fail)
        run: pnpm gate:routing:primary-slices | tee artifacts/routing-primary-slices-eval.log

      - name: API BranchVerdict rules (jest, no LLM)
        run: pnpm gate:api:branch-verdict-rules | tee artifacts/api-branch-verdict-rules.log

      - name: API model-routing baseline (p95 + structural cost, jest)
        run: pnpm gate:api:model-routing-baseline | tee artifacts/api-model-routing-baseline.log

      - name: API planner promotion policy (canary/rollback, jest)
        run: pnpm gate:api:planner-promotion-policy | tee artifacts/api-planner-promotion-policy.log

      - name: API control-tower planner envelope (jest)
        run: pnpm gate:api:control-tower-planner-envelope | tee artifacts/api-control-tower-planner-envelope.log

      - name: Docs lint gate (hard fail)
        run: pnpm lint:docs | tee artifacts/docs-lint-gate.log

      - name: Web RAI chat thread smoke (jest)
        run: pnpm gate:web:rai-chat-smoke | tee artifacts/web-rai-chat-smoke.log

      - name: Web UI language audit (LANGUAGE_POLICY / user-visible RU)
        run: pnpm lint:ui-language | tee artifacts/ui-language-gate.log

      - name: Upload gate artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: invariant-gates-artifacts
          path: artifacts/
          if-no-files-found: warn
